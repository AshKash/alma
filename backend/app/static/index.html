<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma — Document Upload</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
        h1 { margin-bottom: 8px; }
        h2 { margin-top: 32px; margin-bottom: 12px; font-size: 18px; }
        p.subtitle { color: #666; margin-bottom: 32px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; margin-top: 20px; }
        input[type="file"] { display: block; margin-bottom: 8px; }
        .hint { font-size: 13px; color: #888; }
        button { margin-top: 24px; padding: 10px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
        button:disabled { background: #93b4f5; cursor: not-allowed; }
        #log-container {
            margin-top: 24px;
            display: none;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }
        #log-container .log-line { white-space: pre-wrap; }
        #log-container .log-line.field { color: #94a3b8; }
        #log-container .log-line.step { color: #38bdf8; }
        #log-container .log-line.done { color: #4ade80; font-weight: 600; }
        #log-container .spinner { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #screenshot { margin-top: 24px; display: none; }
        #screenshot img { width: 100%; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Alma</h1>
    <p class="subtitle">Upload passport and G-28 form to extract data and auto-fill the immigration form.</p>

    <form id="uploadForm">
        <label for="passport">Passport (PDF, JPEG, or PNG)</label>
        <input type="file" id="passport" name="passport" accept=".pdf,.jpg,.jpeg,.png" required>
        <span class="hint">Upload a scan or photo of the passport bio-data page</span>

        <label for="g28">G-28 Form (PDF, JPEG, or PNG)</label>
        <input type="file" id="g28" name="g28" accept=".pdf,.jpg,.jpeg,.png" required>
        <span class="hint">Upload the Notice of Entry of Appearance form</span>

        <button type="submit">Upload & Fill Form</button>
    </form>

    <div id="log-container"></div>
    <div id="screenshot"></div>

    <script>
        const form = document.getElementById('uploadForm');
        const logContainer = document.getElementById('log-container');
        const screenshot = document.getElementById('screenshot');

        function addLog(message) {
            const line = document.createElement('div');
            line.className = 'log-line';
            if (message.startsWith('  ')) {
                line.className += ' field';
            } else if (message.includes('Done!')) {
                line.className += ' done';
            } else {
                line.className += ' step';
            }
            line.textContent = message;
            logContainer.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            logContainer.innerHTML = '';
            logContainer.style.display = 'block';
            screenshot.style.display = 'none';
            form.querySelector('button').disabled = true;

            addLog('Starting upload...');

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Upload failed');
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Parse SSE events from buffer
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop(); // keep incomplete chunk

                    for (const part of parts) {
                        if (!part.trim()) continue;
                        let eventType = 'message';
                        let data = '';
                        for (const line of part.split('\n')) {
                            if (line.startsWith('event: ')) eventType = line.slice(7);
                            else if (line.startsWith('data: ')) data = line.slice(6);
                        }
                        if (!data) continue;

                        const parsed = JSON.parse(data);

                        if (eventType === 'log') {
                            addLog(parsed.message);
                        } else if (eventType === 'done') {
                            if (parsed.screenshot) {
                                screenshot.innerHTML = `<h2>Filled Form</h2><img src="data:image/png;base64,${parsed.screenshot}" alt="Filled form">`;
                                screenshot.style.display = 'block';
                            }
                        }
                    }
                }
            } catch (err) {
                addLog(`ERROR: ${err.message}`);
            } finally {
                form.querySelector('button').disabled = false;
            }
        });
    </script>
</body>
</html>
